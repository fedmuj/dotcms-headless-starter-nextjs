verifyDepsBeforeRun: false
# @dotcms/react 1.4.0 imports style-editor helpers from @dotcms/uve's root
# export, which 1.5.6+ moved to an internal entry — pin the working version.
overrides:
  '@dotcms/uve': 1.5.0
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
allowBuilds:
  '@dotcms/dotcli': set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
